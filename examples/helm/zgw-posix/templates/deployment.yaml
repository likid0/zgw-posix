apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zgw-posix.fullname" . }}
  labels:
    {{- include "zgw-posix.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zgw-posix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zgw-posix.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zgw-posix.fullname" . }}-sa
      securityContext:
        runAsUser: 167
        runAsGroup: 167
        fsGroup: 167
      initContainers:
      - name: init-dirs
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        command: ['sh', '-c', 'mkdir -p /data/posix /data/db /data/store && mkdir -p /home/ceph/.aws']
        volumeMounts:
        - mountPath: /data
          name: zgw-data
        - mountPath: /home/ceph
          name: ceph-home
      containers:
      - name: zgw-posix
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: s3
          protocol: TCP
        {{- if .Values.podTLS.enabled }}
        - containerPort: 7443
          name: s3-https
          protocol: TCP
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
        - name: COMPONENT
          value: zgw-posix
        - name: RGW_POSIX_BASE_PATH
          value: /var/lib/ceph/rgw_posix_driver
        - name: RGW_POSIX_DATABASE_ROOT
          value: /var/lib/ceph/rgw_posix_db
        - name: HOME
          value: /home/ceph
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "zgw-posix.fullname" . }}-user
              key: ACCESS_KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "zgw-posix.fullname" . }}-user
              key: SECRET_KEY
        {{- if .Values.podTLS.enabled }}
        - name: RGW_TLS_ENABLED
          value: "true"
        - name: RGW_TLS_CERT_PATH
          value: /etc/ceph/tls/tls.crt
        - name: RGW_TLS_KEY_PATH
          value: /etc/ceph/tls/tls.key
        {{- end }}
        {{- if .Values.quotas.user.enabled }}
        - name: RGW_USER_QUOTA_MAX_SIZE
          value: {{ .Values.quotas.user.maxSize | quote }}
        - name: RGW_USER_QUOTA_MAX_OBJECTS
          value: {{ .Values.quotas.user.maxObjects | quote }}
        {{- end }}
        {{- if .Values.quotas.bucket.enabled }}
        - name: RGW_BUCKET_QUOTA_MAX_SIZE
          value: {{ .Values.quotas.bucket.maxSize | quote }}
        - name: RGW_BUCKET_QUOTA_MAX_OBJECTS
          value: {{ .Values.quotas.bucket.maxObjects | quote }}
        {{- end }}
        volumeMounts:
        - mountPath: /var/lib/ceph/rgw_posix_driver
          name: zgw-data
          subPath: posix
        - mountPath: /var/lib/ceph/rgw_posix_db
          name: zgw-data
          subPath: db
        - mountPath: /var/lib/ceph/radosgw
          name: zgw-data
          subPath: store
        - mountPath: /etc/ceph/ceph.conf
          name: zgw-config
          subPath: ceph.conf
          readOnly: true
        - mountPath: /home/ceph
          name: ceph-home
        - mountPath: /home/ceph/.aws/config
          name: zgw-config
          subPath: aws-config
          readOnly: true
        - mountPath: /home/ceph/.bashrc
          name: zgw-config
          subPath: bashrc
          readOnly: true
        {{- if .Values.podTLS.enabled }}
        - mountPath: /etc/ceph/tls
          name: tls-certs
          readOnly: true
        {{- end }}
        livenessProbe:
          tcpSocket:
            port: {{ if .Values.podTLS.enabled }}s3-https{{ else }}s3{{ end }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          {{- if .Values.podTLS.enabled }}
          # httpGet cannot verify self-signed/internal certs; tcpSocket is used
          # when TLS is terminated at the pod.
          tcpSocket:
            port: s3-https
          {{- else }}
          httpGet:
            path: /
            port: s3
          {{- end }}
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: zgw-data
        persistentVolumeClaim:
          claimName: {{ include "zgw-posix.fullname" . }}-data
      - name: zgw-config
        configMap:
          name: {{ include "zgw-posix.fullname" . }}-cm
      - name: ceph-home
        emptyDir: {}
      {{- if .Values.podTLS.enabled }}
      - name: tls-certs
        secret:
          secretName: {{ include "zgw-posix.tlsSecretName" . }}
          defaultMode: 0640
      {{- end }}
