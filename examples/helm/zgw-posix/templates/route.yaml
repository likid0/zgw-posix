{{- if .Values.openshift.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.service.name | default (include "zgw-posix.fullname" .) }}
  labels:
    {{- include "zgw-posix.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ .Values.service.name | default (include "zgw-posix.fullname" .) }}
    weight: 100
  {{- if .Values.podTLS.enabled }}
  port:
    targetPort: s3-https
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  {{- else }}
  port:
    targetPort: s3
  tls:
    termination: {{ .Values.openshift.route.termination | default "edge" }}
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
  wildcardPolicy: None
{{- end }}
