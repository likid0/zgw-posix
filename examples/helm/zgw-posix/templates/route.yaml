{{- if .Values.openshift.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.service.name | default (include "zgw-posix.fullname" .) }}
  labels:
    {{- include "zgw-posix.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ .Values.service.name | default (include "zgw-posix.fullname" .) }}
    weight: 100
  port:
    targetPort: s3
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
