{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zgw-posix.fullname" . }}
  labels:
    {{- include "zgw-posix.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.podTLS.enabled }}
    # Pod-level TLS: ingress passes encrypted traffic straight to the pod.
    # This annotation works for nginx-ingress; adjust for other controllers.
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls (not .Values.podTLS.enabled) }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $.Values.service.name | default (include "zgw-posix.fullname" $) }}
                port:
                  {{- if $.Values.podTLS.enabled }}
                  name: s3-https
                  {{- else }}
                  number: {{ $.Values.service.port | default 80 }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
